index.html<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kamina Wave - Inscription</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#020617,#0f172a,#020617);
      color:#fff;
      overflow-x:hidden;
    }.bg-glow{
  position:fixed;
  width:500px;
  height:500px;
  background:#22c55e;
  filter:blur(150px);
  opacity:0.2;
  top:-100px;
  left:-100px;
  animation:moveGlow 10s infinite alternate;
}

@keyframes moveGlow{
  to{transform:translate(200px,200px)}
}

.container{
  max-width:420px;
  margin:60px auto;
  padding:25px;
  background:rgba(30,41,59,0.6);
  backdrop-filter:blur(20px);
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}

h1{
  font-size:28px;
  font-weight:800;
  margin-bottom:10px;
}

p{
  opacity:0.8;
  font-size:14px;
  margin-bottom:15px;
}

input,button{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  font-size:14px;
}

input{
  background:#1e293b;
  color:#fff;
}

input:focus{
  outline:2px solid #22c55e;
}

button{
  background:linear-gradient(90deg,#22c55e,#4ade80);
  color:#022c22;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #22c55e;
}

.pay-box{
  background:#020617;
  padding:15px;
  border-radius:12px;
  margin:15px 0;
  border:1px solid #22c55e;
}

.number{
  font-size:18px;
  font-weight:700;
  color:#4ade80;
  margin-top:5px;
}

.footer{
  margin-top:15px;
  font-size:12px;
  opacity:0.6;
}

  </style>
</head>
<body><div class="bg-glow"></div><div class="container">
  <h1>🌊 KAMINA WAVE 🌊</h1>
  <p>Inscris-toi maintenant et réserve ta place 🔥</p>  <form>
    <input type="text" placeholder="Nom complet" required>
    <input type="tel" placeholder="Numéro Airtel" required>
    <input type="text" placeholder="Ville" required><div class="pay-box">
  <p>💰 Paiement Airtel Money</p>
  <div class="number">+243 XXX XXX XXX</div>
</div>

<p>📸 Ajoute ta preuve de paiement</p>
<input type="file" required>

<button type="submit">Je valide mon inscription 🚀</button>

  </form>  <div class="footer">Powered by Kamina Wave ⚡</div>
</div></body>
</html>
